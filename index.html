function resizeCanvasAndScale() {
    //CSS size
    const cssW = window.innerWidth;

    //DPR 
    dprVal = window.devicePixelRatio || 1;
    
    //set canvas internal pixels and CSS size

//The sign of a num
function sign(x) {
    return (abs(x) / x) || 0;
}

//returns the random value of a min and max number
function random(min, max) {  
    return Math.random() * (max - min + 1) + min;
}

//Calculates a number between two numbers at a specific increment
function lerp(num1, num2, amt) {
	return num1 + (num2 - num1) * amt;
}

//Re-maps a number from one range to another.
function map(num, start1, stop1, start2, stop2) {
	return start2 + (num - start1) / (stop1 - start1) * (stop2 - start2);
}

//Constrains a value to not exceed a maximum and minimum value
function constrain(num, min, max) {
	return Math.max(Math.min(num, max), min);
}

//Calculates the distance between two points
function dist(x1, y1, x2, y2) {
	return Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
}

//Finds a midpoint
function midpoint(Ax, Bx, Ay, By){
    var mx = (Ax + Bx)/2;
    var my = (Ay + By)/2;
    
    return [mx, my];
}

//Maps a point to a line where percentage is line length
function mapToLine(x1, y1, x2, y2, percentage) {
    return {
        x : x1 * (1.0 - percentage) + x2 * percentage, 
        y : y1 * (1.0 - percentage) + y2 * percentage
    };

function quad(x1, y1, x2, y2, x3, y3, x4, y4) {
	beginShape();
	vertex(x1, y1);
	vertex(x2, y2);
	vertex(x3, y3);
	vertex(x4, y4);
	vertex(x1, y1);
	endShape();

}

	ctx.beginPath();
	    ctx.moveTo(x1, y1);

}
function line(x1, y1, x2, y2) {

//a rectangle with 4 individual rounding options
const rect = (x, y, w, h, r1 = 0, r2, r3, r4) => {
    //minimum
    const maxR = Math.min(w, h) / 2;
    
    //constrain values; allows negative for scalloped corners
    const limit = (val) => Math.max(-maxR, Math.min(val, maxR));
    
    //default extra radii to r1 if they are undefined
    const radii = [r1, r2 ?? r1, r3 ?? r1, r4 ?? r1].map(limit);
    const [tr1, tr2, tr3, tr4] = radii;
    
    beginShape();
        ctx.moveTo(x, y + tr1);
        curveVertex(x, y, x + tr1, y);

        vertex(x + w - tr2, y);
        curveVertex(x + w, y, x + w, y + tr2);
        
        vertex(x + w, y + h - tr3);
        curveVertex(x + w, y + h, x + w - tr3, y + h);
        
        vertex(x + r4, y + h);
        curveVertex(x, y + h, x, y + h - tr4);
        
        vertex(x, y + tr1);
    endShape();
};

//circles and arcs
function arcTo(x, y, r, start, stop) {
	ctx.arc(x, y, r / 2, start / 180 * Math.PI, stop / 180 * Math.PI);
}
function arc(x, y, w, h, start, stop) {
	ctx.save();
	ctx.translate(x, y);
	ctx.scale(1, h / w);
	beginShape();
	arcTo(0, 0, w, start, stop);
	endShape();
	ctx.restore();
}
function ellipse(x, y, w, h) {
	w = Math.abs(w);
	h = Math.abs(h);

}

//the log constructor
class Log {
    /*
        Created by Arrow
        https://www.khanacademy.org/profile/kaid_5229809678324099512179597/projects
    */
    constructor(elementId) {
        this.consoleElement = document.getElementById(elementId);

        //fallback
        if (!this.consoleElement) {
            const fallback = document.createElement('div');
            fallback.id = elementId;
            fallback.style.border = '1px solid black';
            fallback.style.padding = '10px';
            fallback.style.margin = '10px';
            fallback.style.fontFamily = 'monospace';
            fallback.style.whiteSpace = 'pre-wrap';
            document.body.appendChild(fallback);
            this.consoleElement = fallback;
        }

        this.logs = new Map();
        this.warnings = new Map();
        this.errors = new Map();
        this.infos = new Map();

        this.baseMessage = "Console:";
        
        //store graphs
        this.graphs = new Map();
        this._graphAutoFrame = null;
        
        //intially render an empty console
        this.render();
    }

    //stringify values helper
    _stringify(v) {
        try {
            if (typeof v === 'object' && v !== null) return JSON.stringify(v, null, 2);
            return String(v);
        } catch (err) {
            return String(v);
        }
    }
    
    //log, warning, error, info. Not really the best implementation/copy of the real deal, but I am going for practicallity over functionality
    log(key, value) {
        if (arguments.length < 2){
            return;  
        } 
        this.logs.set(key, this._stringify(value));
        this.render();
    }
    warn(key, value) {
        this.warnings.set(key, this._stringify(value));
        this.render();
    }
    error(key, value) {
        this.errors.set(key, this._stringify(value));
        this.render();
    }
    info(key, value) {
        this.infos.set(key, this._stringify(value));
        this.render();
    }
    
    //render everything to the DOM
    render() {
        let outputHTML = `${this.baseMessage}\n`;

        this.infos.forEach((value, key) => {
            outputHTML += `<span class="info">INFO: ${key}</span>\n`;
        });
        this.errors.forEach((value, key) => {
            outputHTML += `<span class="error">ERROR: ${key}</span>\n`;
        });
        this.warnings.forEach((value, key) => {
            outputHTML += `<span class="warn">WARNING: ${key}</span>\n`;
        });
        this.logs.forEach((value, key) => {
            outputHTML += `${key}: ${value}\n`;
        });



    
        //preserve graph canvases and re-append after text content to avoid removing them
        const preserved = [];
        this.graphs.forEach(g => {
            if (g.canvas && g.canvas.parentNode === this.consoleElement){
                preserved.push(g.canvas);
            }
        });

        this.consoleElement.innerHTML = `<pre>${outputHTML}</pre>`;

        for (const c of preserved){ 
            this.consoleElement.appendChild(c);
        }
    }

    clear() {
        this.info("Console cleared");
        this.logs.clear();
        this.warnings.clear();
        this.errors.clear();
        this.infos.clear();
        this.render();
    }

    //yay graphs!
    createGraph(key, getter, opts = {}) {
        /**
         * key: string id
         * getter: function() numeric value
         * options: 
           { 
            width, height, color, background, buffer, min, max, showValue, strokeWidth, fill
           }
         * 
         */
        if (!key){ 
            throw new Error('createGraph requires a key');
        }
        if (!getter){ 
            throw new Error('createGraph requires a getter function or numeric value');
        }

        const options = Object.assign({
            width: 220,
            height: 48,
            color: '#9ad0ff',
            background: 'rgba(0,0,0,0)',
            buffer: 220,
            min: null,
            left: 0,
            max: null,
            top: 10,
            showValue: true,
            strokeWidth: 2,
            fill: true
        }, opts);
        
        //if an existing graph has this same key, remove it
        if (this.graphs.has(key)){ 
            this.removeGraph(key);
        }

        const canvas = document.createElement('canvas');
        canvas.width = options.width;
        canvas.height = options.height;
        canvas.style.display = 'block';
        canvas.style.margin = `${options.top}px ${options.left}px`;
        canvas.style.background = options.background || 'transparent';
        canvas.style.borderRadius = '4px';
        canvas.title = key;

        const ctx = canvas.getContext('2d');

        const graph = {
            canvas,
            ctx,
            getter,
            opts: options,
            history: []
        };
        
        //append canvas to console
        this.consoleElement.appendChild(canvas);
        this.graphs.set(key, graph);

        if (!this._graphAutoFrame){ 
            this._startGraphAutoUpdate();
        }

        return canvas;
    }

    removeGraph(key) {
        const entry = this.graphs.get(key);
        if (!entry) { 
            return;
        }
        try { 
            if (entry.canvas && entry.canvas.parentNode){ 
                entry.canvas.parentNode.removeChild(entry.canvas); 
            }
        
            
        } catch {}
        
        this.graphs.delete(key);
        
        //if no graphs why graph?
        if (this.graphs.size === 0){ 
            this._stopGraphAutoUpdate();
        }
    }

    updateGraphs() {
        if (!this.graphs || this.graphs.size === 0){ 
            return;
        }
        
        for (const [key, g] of this.graphs) {
            let value;
            try {
                value = (typeof g.getter === 'function') ? g.getter() : g.getter;
                //not entirely sure how fast it is to be assigning Number() and isFinite. I might change this into a more agressive approach later
                value = Number(value);
                if (!isFinite(value)) {
                    value = 0;
                }
            } 
            catch (e) {
                value = 0;
            }

            const hist = g.history;
            const buffer = Math.max(4, Math.floor(g.opts.buffer));
            hist.push(value);
            if (hist.length > buffer){
                hist.shift();
            }
            
            
            const minOpt = g.opts.min;
            const maxOpt = g.opts.max;
            
            //one liner if statements are really handy, and more clear than if() then. if(){then} is the most readable though and I despise the if() then one line statement approach
            
            //autoscaling
            let minV = (typeof minOpt === 'number') ? minOpt : Math.min(...hist, 0);
            let maxV = (typeof maxOpt === 'number') ? maxOpt : Math.max(...hist, 1);
            
            if (maxV - minV < 1e-6){ 
                maxV = minV + 1;
            }

            const ctx = g.ctx;
            const w = g.canvas.width;
            const h = g.canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            //background for nasty canvases
            if (g.opts.background) {
                ctx.fillStyle = g.opts.background;
                ctx.fillRect(0, 0, w, h);
            }
            
            //draw the lines
            const len = hist.length;
            const step = (w - 4) / Math.max(buffer - 1, 1);
            
            //begin a new path
            ctx.beginPath();
            for (let i = 0; i < len; i++) {
                const v = hist[i];
                const t = (v - minV) / (maxV - minV);
                const y = h - 4 - t * (h - 8);
                const x = 2 + (i - (buffer - len)) * step;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            
            //take the intergal haha
            if (g.opts.fill && len > 0) {
                ctx.lineTo(2 + (len - 1 - (buffer - len)) * step, h - 2);
                ctx.lineTo(2 + (0 - (buffer - len)) * step, h - 2);
                ctx.closePath();
                ctx.fillStyle = Log._hexToRGBA(g.opts.color, 0.12);
                ctx.fill();
                
                //redraw the stroke path
                ctx.beginPath();
                for (let i = 0; i < len; i++) {
                    const v = hist[i];
                    const t = (v - minV) / (maxV - minV);
                    const y = h - 4 - t * (h - 8);
                    const x = 2 + (i - (buffer - len)) * step;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
            }

            ctx.strokeStyle = g.opts.color;
            ctx.lineWidth = g.opts.strokeWidth;
            ctx.stroke();

            if (g.opts.showValue && len > 0) {
                const last = hist[hist.length - 1];
                ctx.font = '12px monospace';
                ctx.fillStyle = g.opts.color;
                ctx.textBaseline = 'top';
                ctx.fillText(`${key}: ${Number(last).toFixed(0)}`, 4, 2);
            }
        }
    }
    
    //rAF driven updating system. Trying to avoid crashing the main loop from all our graphiness
    _startGraphAutoUpdate() {
        if (this._graphAutoFrame) return;
        const tick = () => {
            if (!this.graphs || this.graphs.size === 0) {
                this._graphAutoFrame = null;
                return;
            }
            try { this.updateGraphs(); } catch (e) { /* swallow */ }
            this._graphAutoFrame = requestAnimationFrame(tick);
        };
        this._graphAutoFrame = requestAnimationFrame(tick);
    }
    
    //what does this do?
    _stopGraphAutoUpdate() {
        if (this._graphAutoFrame) {
            cancelAnimationFrame(this._graphAutoFrame);
            this._graphAutoFrame = null;
        }
    }
    
    //I hate this function as much as you do
    static _hexToRGBA(hex, alpha = 1) {
        /* 
             Color conversion. Fetched from stackoverflow with love
        */
        if (!hex) return `rgba(255,255,255,${alpha})`;
        if (hex.indexOf('rgb') === 0) {
            if (hex.indexOf('rgba') === 0) return hex.replace(/rgba\(([^,]+),([^,]+),([^,]+),([^\)]+)\)/, `rgba($1,$2,$3,${alpha})`);
            return hex.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
        }
        let c = hex.replace('#', '');
        if (c.length === 3) c = c.split('').map(ch => ch + ch).join('');
        const num = parseInt(c, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
}

//my vector library
const vector = (function() {
    /*
        By Arrow (@Arrow.programming):
        https://www.khanacademy.org/profile/Arrow.programming/
        Feel free to use with credit
        
        
        "a" = "A"lways represents the vector that you are modifying
        This library supports x, y, and z as well as their respective transformations
        Avoid using deepCopy in PJS environment as JSON is unsupported
    */
    const func = function(x, y, z) {
        /*
            Create a new vector with given x, y, and optional z coordinates.
        */
        return {
            x: x,
            y: y,
            z: z || 0,
        };
    };
    func.set = function(a, x, y, z) {
        /*
            Set the coordinates of vector a to x, y, and optional z.
        */
        a.x = x;
        a.y = y;
        a.z = z || 0;
    };
    func.add = function(a, b) {
        /*
            Add vector b to vector a and return the resulting vector.
        */
        return {
            x: a.x + b.x,
            y: a.y + b.y,
            z: a.z + b.z,
        };
    };
    func.sub = function(a, b) {
        /*
            Subtract vector b from vector a and return the resulting vector.
        */
        return {
            x: a.x - b.x,
            y: a.y - b.y,
            z: a.z - b.z,
        };
    };
    func.mult = function(a, mult) {
        /*
            Multiply vector a by scalar mult and return the resulting vector.
        */
        return {
            x: a.x * mult,
            y: a.y * mult,
            z: a.z * mult,
        };
    };
    func.div = function(a, div) {
        /*
            Divide vector a by scalar div and return the resulting vector.
        */
        return {
            x: a.x / div,
            y: a.y / div,
            z: a.z / div,
        };
    };
    func.mag = function(a) {
        /*
            Calculate and return the magnitude of vector a.
        */
        return Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z);
    };
    func.dot = function(a, b) {
        /*
            Calculate and return the dot product of vectors a and b.
        */
        return a.x * b.x + a.y * b.y + a.z * b.z;
    };
    func.cross = function(a, b) {
        /*
            Calculate and return the cross product of vectors a and b.
        */
        return {
            x: a.y * b.z - a.z * b.y,
            y: a.z * b.x - a.x * b.z,
            z: a.x * b.y - a.y * b.x,
        };
    };
    func.norm = function(a) {
        /*
            Normalize vector a and return the resulting unit vector.
        */
        const len = func.mag(a);
        return {
            x: a.x / len,
            y: a.y / len,
            z: a.z / len,
        };
    };
    func.limit = function(a, lim) {
        /*
            Limit the magnitude of vector a to lim and return the resulting vector.
        */
        const len = func.mag(a);
        const multi = len <= lim ? 1 : lim / len;
        return {
            x: a.x * multi,
            y: a.y * multi,
            z: a.z * multi,
        };
    };
    func.angleBetween = function(a, b) {
        /*
            Calculate and return the angle between vectors a and b.
        */
        return Math.acos(func.dot(a, b) / (func.mag(a) * func.mag(b)));
    };
    func.dist = function(a, b) {
        /*
            Calculate and return the distance between vectors a and b.
        */
        return func.mag(func.sub(a, b));
    };
    func.rotateX = function(a, angle) {
        /*
            Rotate vector a around the X-axis by angle and return the resulting vector.
        */
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return {
            x: a.x,
            y: a.y * cos - a.z * sin,
            z: a.y * sin + a.z * cos,
        };
    };
    func.rotateY = function(a, angle) {
        /*
            Rotate vector a around the Y-axis by angle and return the resulting vector.
        */
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return {
            x: a.x * cos + a.z * sin,
            y: a.y,
            z: -a.x * sin + a.z * cos,
        };
    };
    func.rotateZ = function(a, angle) {
        /*
            Rotate vector a around the Z-axis by angle and return the resulting vector.
        */
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return {
            x: a.x * cos - a.y * sin,
            y: a.x * sin + a.y * cos,
            z: a.z,
        };
    };
    func.lerp = function(a, b, amt) {
        /*
            Linearly interpolate between vectors a and b by amt and return the resulting vector.
        */
        return {
            x: a.x + (b.x - a.x) * amt,
            y: a.y + (b.y - a.y) * amt,
            z: a.z + (b.z - a.z) * amt,
        };
    };
    func.copy = function(a) {
        /*
            Create a new vector as a copy of a previous one.
        */
        return {
            x: a.x,
            y: a.y,
            z: a.z,
        };
    };
    func.deepCopy = function(a) {
        /*
            Create a deep copy of vector a and return it.
        */
        return JSON.parse(JSON.stringify(a));
    };
    func.array = function(a) {
        /*
            Convert vector a to an array [x, y, z] and return it.
        */
        return [a.x, a.y, a.z];
    };
    func.equals = function(a, b) {
        /*
            Check if vectors a and b are equal and return the result.
        */
        return a.x === b.x && a.y === b.y && a.z === b.z;
    };
    func.random2D = function() {
        /*
            Create and return a random 2D unit vector.
        */
        const angle = Math.random() * Math.PI * 2;
        return {
            x: Math.cos(angle),
            y: Math.sin(angle),
            z: 0,
        };
    };
    func.random3D = function() {
        /*
            Create and return a random 3D unit vector.
        */
        const angle1 = Math.random() * Math.PI * 2;
        const angle2 = Math.random() * Math.PI * 2;
        return {
            x: Math.cos(angle1) * Math.sin(angle2),
            y: Math.sin(angle1) * Math.sin(angle2),
            z: Math.cos(angle2),
        };
    };
    func.reflect = function(a, normal) {
        /*
            Reflect vector a around the given normal vector and return the resulting vector.
        */
        const d = func.dot(a, normal);
        return {
            x: a.x - 2 * d * normal.x,
            y: a.y - 2 * d * normal.y,
            z: a.z - 2 * d * normal.z,
        };
    };
    func.project = function(a, b) {
        /*
            Project vector a onto vector b and return the resulting vector.
        */
        const dotProduct = func.dot(a, b);
        const magB = func.mag(b);
        const scalar = dotProduct / (magB * magB);
        return {
            x: b.x * scalar,
            y: b.y * scalar,
            z: b.z * scalar,
        };
    };
    func.midpoint = function(a, b) {
        /*
            Calculate and return the midpoint between vectors a and b.
        */
        return {
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2,
            z: (a.z + b.z) / 2,
        };
    };
    func.angleTo = function(a, b) {
        /*
            Calculate and return the angle from vector a to vector b in 2D.
        */
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        return angle;
    };
    func.angleTo3D = function(a, b) {
        /*
            Calculate and return the angles from vector a to vector b in 3D.
        */
        const angleX = Math.atan2(b.z - a.z, b.y - a.y);
        const angleY = Math.atan2(b.z - a.z, b.x - a.x);
        const angleZ = Math.atan2(b.y - a.y, b.x - a.x);
        return {
            x: angleX,
            y: angleY,
            z: angleZ,
        };
    };
    func.isZero = function(a) {
        /*
            Check if vector a is a zero vector and return the result.
        */
        return a.x === 0 && a.y === 0 && a.z === 0;
    };
    func.isUnitVector = function(a) {
        /*
            Check if vector a is a unit vector and return the result.
        */
        return func.mag(a) === 1;
    };
    return func;
})();

// since setInterval is so slow, this replaces Date.now and someother nasty stuff to make a nice reusable group of functions. I recieved a lot of help from the internet making this, and by no means is it the best implementation, but it does the trick
(() => {
    /** 
        Created by Arrow
        https://www.khanacademy.org/profile/Arrow.programming
    **/
    //performance.now() is faster than Date.now()
    if (typeof performance === 'undefined' || !performance.now) {
        //fallback
        globalThis.performance = globalThis.performance || { 
            now: () => Date.now() 
        };
    }
    
      //MessageChannel microtask-style scheduler for near-zero delays (faster than setTimeout(0))
    const mc = typeof MessageChannel !== 'undefined' ? new MessageChannel() : null;
    const _immediateQueue = new Map();
    let _immediateId = 1;
    if (mc) {
        mc.port1.onmessage = (e) => {
            const id = e.data;
            const fn = _immediateQueue.get(id);
            if (fn) {
                _immediateQueue.delete(id);
                try { 
                    fn(); 
                } catch (err) { 
                    setTimeout(() => { 
                        throw err; 
                    }, 0); 
                }
            }
        };
    }
    function postImmediate(fn) {
        if (!mc) {
            //no MessageChannel available fallback
            return setTimeout(fn, 0);
        }
        const id = _immediateId++;
        _immediateQueue.set(id, fn);
        mc.port2.postMessage(id);
        return id;
    }
    
    //internal registry so we can clear by id like clearInterval
    const timers = new Map();
    let nextTimerId = 1;
    
    //setFastInterval: returns numeric id (like setInterval). Use clearFastInterval(id) to stop.
    function setFastInterval(fn, intervalMs, options = {}) {
        if (typeof fn !== 'function'){ 
            throw new TypeError('callback must be a function');
        }
        intervalMs = Number(intervalMs) || 0;
        
        const id = nextTimerId++;
        let expected = performance.now() + intervalMs;
        let stopped = false;
        let pendingHandle = null;
        
        //not the best implementation, but oh well lol
        function scheduleNext(delay) {
            if (stopped){ 
                return;
            }
            if (delay <= 1) {
                //near-zero delay 
                pendingHandle = postImmediate(step);
                timers.set(id, { stop: () => { 
                    /* cannot cancel MessageChannel post; leave fn guard */ 
                    
                } });
            } 
            else {
                pendingHandle = setTimeout(step, delay);
                timers.set(id, { 
                    stop: () => clearTimeout(pendingHandle) 
                });
            }
        }
    
        function step() {
            if (stopped) {
                return;
            }
            
            const now = performance.now();
            const drift = now - expected;
            
            //run callback again :P
            try { 
                fn(); 
            } 
            catch (err) {
                //Don't break the timer on user errors lol
                setTimeout(() => { throw err; }, 0);
            }
            
            //compute next expected time and the delay to schedule
            expected += intervalMs;
            
            //If the drift is huge (like tab is suspended in chrome or edge i think edge has that?), skip missed intervals by catching up
            if (drift > intervalMs * 5) {
                //If drift is extremely large, reset expected to now + interval to avoid long backlog loops
                expected = now + intervalMs;
            }
            
            const nextDelay = Math.max(0, intervalMs - Math.max(0, drift));
            scheduleNext(nextDelay);
        }
            
        //intiaite
        scheduleNext(intervalMs);
            
        timers.set(id, {
            stop: () => {
                stopped = true;
            
                //cleanup for pending handle if it's a timeout
                try { 
                    clearTimeout(pendingHandle); 
                } catch (_) {}
            
                _immediateQueue.forEach((fn, k) => {
                    if (fn === step) { 
                        _immediateQueue.delete(k);
                    }
                });
                
                timers.delete(id);
            }
        });
            
        return id;
    }
    
    function clearFastInterval(id) {
        const t = timers.get(id);
        if (!t) {
            return; 
        }
        t.stop();
    }
        
    //make this global
    if (typeof globalThis !== 'undefined') {
        globalThis.setFastInterval = setFastInterval;
        globalThis.clearFastInterval = clearFastInterval;
    } 
    else if (typeof window !== 'undefined') {
        window.setFastInterval = setFastInterval;
        window.clearFastInterval = clearFastInterval;
    } 
    else if (typeof self !== 'undefined') {
        self.setFastInterval = setFastInterval;
        self.clearFastInterval = clearFastInterval;
    } 
    else {
        //and export!
        try { 
            module.exports = { 
                setFastInterval, 
                clearFastInterval 
            }; 
        } catch (_) {}
    }

    
})();

class Explosian {

        Created by Arrow
        https://www.khanacademy.org/profile/Arrow.programming
    **/
    constructor(x, y, w, h, parSize) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;

        this.array = this.getImgs();

    runParticles(par){
        for(let i = 0; i < par.length; i++){
            ctx.save();
                ctx.translate(par[i].x, par[i].y);
                ctx.translate(-this.parSize/2, 0);
                //put image particles cannot be transparent, going to have to fix this later by adding a seperate canvas
                //ctx.globalAlpha = par[i].opacity;
                //ctx.globalAlpha = 0.1;
                //image(par[i].i, 0, 0);

        }
        return this.ImgArr;
    }
    run(){
        this.runParticles(this.array);
    }
};

//implements a randomized value on a bell curve to give a random normal distribution
function gaussianRandom() {
    //sample size is a implementation of the Central Limit Theroem
    var sampSize = 7;
    var rand = 0;
    for (var i = 0; i < sampSize; i += 1) {
        rand += Math.random();
    }
    return rand / sampSize;
}
function normRandom(start, end) {
  return Math.floor(start + gaussianRandom() * (end - start + 1));
}

//Particle Systems
const Particle = (function () {
    const Configure = function (config) {
        this.position = config.position || Object;
        this.size = config.size || 10;
        this.color = config.color;
        this.velocity = config.velocity || Object;
        this.life = config.life || 100;
        this.acceleration = config.acceleration || Object;
        this.angle = config.angle || 0;
        this.rotation = config.rotation || 0;
        this.opacity = config.opacity || 1;
        this.clear = config.clear || false;
        this.collide = config.collide || false;
        
        //this.dT = deltaTime;
        this.initialLife = config.life;
        this.drawingMethod = config.drawingMethod || ctx;
    };
    Configure.prototype = {
        update: function(DT){
            this.velocity.x += this.acceleration.x * DT;
            this.velocity.y += this.acceleration.y * DT;
            
            this.position.x += this.velocity.x * DT;
            this.position.y += this.velocity.y * DT;

            this.angle += this.rotation * DT;
            
            if (this.clear !== false) {
                this.opacity = Math.max(0, this.life / this.initialLife);
            } 
            else {
                this.opacity = 1;
            }
            
            this.life -= 60 * DT;
        },
        draw: function () {
            this.drawingMethod.save();
                this.drawingMethod.translate(this.position.x + this.size / 2, this.position.y + this.size / 2);
                this.drawingMethod.rotate(this.angle / 180 * Math.PI);
                this.drawingMethod.fillStyle = this.color;
                this.drawingMethod.globalAlpha = this.opacity;
                this.drawingMethod.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            this.drawingMethod.restore();
        },
        die: function(){
            return this.life < 0;
        },
        run: function(DT){
            this.draw();
            this.update(DT);
        },
    };
    return Configure;
})();

Particle.prototype.deepCopy = function(config) {
    this.position = {
        x: (config.position && config.position.x) || 0,
        y: (config.position && config.position.y) || 0
    };
    this.size = config.size || 10;
    this.color = config.color || '#fff';
    this.velocity = {
        x: (config.velocity && config.velocity.x) || 0,
        y: (config.velocity && config.velocity.y) || 0
    };
    this.life = (config.life !== undefined ? config.life : 100);
    this.initialLife = this.life;

    this.acceleration = {
        x: (config.acceleration && config.acceleration.x) || 0,
        y: (config.acceleration && config.acceleration.y) || 0
    };
    this.angle = config.angle || 0;
    this.rotation = config.rotation || 0;
    this.opacity = (config.opacity !== undefined ? config.opacity : 1);
    this.clear = !!config.clear;
    this.collide = !!config.collide;
    this._pooledActive = true;
};

class ParticlePool {
    constructor(initialSize = 400) {
        this.pool = [];
        for (let i = 0; i < initialSize; i++) {
            //create a minimal particle instance
            const p = new Particle({
                position: { 
                    x: 0, 
                    y: 0 
                },
                velocity: { 
                    x: 0,
                    y: 0
                },
                size: 1,
                color: '#000',
                life: 0,
                acceleration: { 
                    x: 0, 
                    y: 0
                }
            });
            p._pooledActive = false;
            this.pool.push(p);
        }
    }

    //acquire a particle and initialize it with config
    get(config) {
        const p = this.pool.length ? this.pool.pop() : new Particle({
            position: { 
                x: 0,
                y: 0 
            },
            velocity: {
                x: 0,
                y: 0
            },
            size: 1,
            color: '#000',
            life: 0,
            acceleration: { 
                x: 0,
                y: 0
            }
        });
        p.deepCopy(config);
        return p;
    }

    //release a particle back to the pool
    release(p) {
        //minimal reset to avoid keeping large nested references
        p._pooledActive = false;
        p.life = 0;
        //zero velocities so reused state is clean
        if (p.position) { 
            p.position.x = 0;
            p.position.y = 0;
        }
        if (p.velocity) {
            p.velocity.x = 0;
            p.velocity.y = 0;
        }
        //push back into pool (no capacity limit here)
        this.pool.push(p);
    }
}

        run: function(DT){
            //scrap object if particles not being added
            if(!this.add){
                this.addParticle();
            }
        
            // update normal particles (swap-pop removal)
            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i];
                p.run(DT);
                if (p.die()) {
                    // release to pool
                    particlePool.release(p);
                    // remove in O(1) by replacing with last element
                    const last = this.particles.pop();
                    if (i < this.particles.length) {
                        this.particles[i] = last;
                    }
                }
            }
        
            // update foreverParticles (same pattern)
            for (let i = this.foreverParticles.length - 1; i >= 0; i--) {
                const p = this.foreverParticles[i];
                p.run(DT);
        
                if (p.collide) {
                    //
                }
                if (p.die()) {
                    particlePool.release(p);
                    const last = this.foreverParticles.pop();
                    if (i < this.foreverParticles.length) {
                        this.foreverParticles[i] = last;
                    }
                }
            }
        },
    };
    return Configure;

    otherRoomOutlineColor: 'blue',
    playerIndicatorColor: 'green',
    
    //pre-calculate room dimensions and positions
    roomDimensions: {},
    worldLayout: {},
    
    init: function() {
        
        //calculate dimensions for each room template
        for (const [key, roomData] of Object.entries(roomTemplates)) {
            const height = roomData.length;
            const width = Math.max(...roomData.map(row => row. length));
            this.roomDimensions[key] = { width, height };
        }
        
        //calculate positions of each room in the world grid
        let currentY = 0;
        for (let row = 0; row < worldAssembly.length; row++) {
            let currentX = 0;
            let maxRowHeight = 0;
            
            for (let col = 0; col < worldAssembly[row].length; col++) {
                const roomKey = worldAssembly[row][col];
                if (roomKey) {
                    const dims = this.roomDimensions[roomKey];
                    this.worldLayout[`${row},${col}`] = {
                        key: roomKey,
                        x: currentX,
                        y: currentY,
                        width: dims. width,
                        height: dims.height
                    };
                    
                    // currentX += dims.width * this.blockSize;
                    // maxRowHeight = Math.max(maxRowHeight, dims.height * this.blockSize);
                    currentX += dims.width;
maxRowHeight = Math.max(maxRowHeight, dims.height);
                }
            }
            currentY += maxRowHeight;
        }
    },
    
    draw: function(playerRow, playerCol, playerX, playerY) {
        ctx.save();
        
        //draw background for minimap
        ctx.fillStyle = this.roomBgColor;
        ctx.fillRect(this.x, this.y, 200, 200);
        
        //draw all rooms
        for (const [key, roomInfo] of Object.entries(this.worldLayout)) {
            const [row, col] = key.split(',').map(Number);
            
            //dimnsioning
            const roomX = this.x + (roomInfo.x * this.blockSize * this.scale);
            const roomY = this.y + (roomInfo.y * this.blockSize * this.scale);
            const roomW = roomInfo.width * this.blockSize * this.scale;
            const roomH = roomInfo.height * this.blockSize * this.scale;
            
            //draw blocks in this room
            const roomTemplate = roomTemplates[roomInfo.key];
            for (let y = 0; y < roomTemplate.length; y++) {
                for (let x = 0; x < roomTemplate[y].length; x++) {
                    if (roomTemplate[y][x] === '#') {
                        const blockX = this.x + ((roomInfo.x + x) * this.blockSize * this.scale);
                        const blockY = this.y + ((roomInfo.y + y) * this.blockSize * this.scale);
                        const blockSize = this.blockSize * this. scale;
                        
                        ctx.fillStyle = this.blockColor;
                        ctx.fillRect(blockX, blockY, blockSize, blockSize);
                    }
                }
            }
            
            //draw room outline
            ctx.lineWidth = 2;
            if (row === playerRow && col === playerCol) {
                ctx.strokeStyle = this.currentRoomOutlineColor;
            } 
            else {
                ctx.strokeStyle = this.otherRoomOutlineColor;
            }
            ctx.strokeRect(roomX, roomY, roomW, roomH);
        }
        
        //draw player indicator
        const playerRoomInfo = this.worldLayout[`${playerRow},${playerCol}`];
        if (playerRoomInfo) {
            //player coords
            const mapPlayerX = this.x + ((playerRoomInfo.x * this. blockSize + playerX) * this.scale);
            const mapPlayerY = this.y + ((playerRoomInfo.y * this.blockSize + playerY) * this.scale);

            ctx.fillStyle = this.playerIndicatorColor;
            //ctx.beginPath();
            ctx.fillRect(mapPlayerX, mapPlayerY, this.blockSize * this.scale, this.blockSize * this.scale * 2);
            //ctx.fill();
        }
        
        ctx.restore();
    }
};

            else {

            }
        }
    };

//rectangle edge check between two entities 
function edgeCheck(a, b) {
    return (
      a.x + a.w > b.x &&
      a.x < b.x + b.w &&
      a.y + a.h > b.y &&
      a.y < b.y + b.h
    );
}

        else {

        };

        if((!this.bottom || !this.top || !this.left || !this.right) && !this.onEdge){
            //adjacent space to the left, top, right, or bottom

        }
        // if(this.colY){

        // }
        // if(this.colX){
        //     fill("blue");
        // }
        ellipse(this.x + this.w/2, this.y + this.h/2, this.w, this.h);

        //vector movement
        //if(!this.collide.left){
            //this.v.x -= this.acceleration;
            //this.dir = -1;
        //}
        if(this.x > player.x){
            //this.accel.x = -0.1;
        }
        if(this.x < player.x){
            //this.accel.x = 0.1;
        }
        this.v.x += this.accel.x;
        this.x += this.v.x;
        
        //fixes an annoying bug
        // if(this.v.x !== 0){
        //     this.x += this.v.x;
        // }
        this.v.x = constrain(this.v.x, -this.speed, this.speed);
    }
    moveY(player){
        this.y += this.accel.y;
        this.y += this.v.y;
    }
    
    
    collideX (that){
        //first check if the player is touching a block
        if(edgeCheck(this, that)){
            //vector velocity can determine what side
            if(this.v.x > 0){
                this.collide.right = true;
                this.x = that.x - this.w;
            }
            else {
                this.collide.left = true;
                this.x = that.x + that.w;
            }
            
            //the player is colliding
            that.colX = true;
            return true;
        }
        //the player is not colliding on the x-axis
        this.collide.left = false;
        this.collide.right = false;
        that.colX = false;
        return false;
    }
    collideY (that){
        //is the player touching a block?
        if(edgeCheck(this, that)){
            
            //console.log("cpu col y", true);
            //vector velocity can determine orientation
            if(this.v.y > 0){
                this.collide.top = true;
                this.y = that.y - this.h;
                this.v.y = 0;
            }
            else {
                this.collide.bottom = true;
                this.y = that.y + that.h;
                this.v.y *= -0.1;
            }
            
            //the player is colliding on the y-axis
            that.colY = true;
            return true;
        }
        else {
            //console.log("cpu col y", false);
        }
        //the player is not colliding on the y-axis
        this.collide.top = false;
        this.collide.bottom = false;
        that.colY = false;
        return false;
    }
    
    run(player){
        this.moveX(player);
        this.moveY(player);
    }
};

//defines a rectangular area with functions to calculate boundaries from two points
class Bounds {
    //creates a Bounds instance by determining top-left origin and dimensions from any two corners
    static fromCorners(x1, y1, x2, y2) {
        const x = Math.min(x1, x2);
        const y = Math.min(y1, y2);
        const width = Math.abs(x1 - x2);
        const height = Math.abs(y1 - y2);
        return new Bounds(x, y, width, height);
    }

    //horizontal and vertical origin
    x = 0;
    y = 0;

    width = 0;
    height = 0;


    constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
    }

    //right edge coordinate
    get maxX() {
        return this.x + this.width;
    }

    //bottom edge coordinate
    get maxY() {
        return this.y + this.height;
    }
}

//coordinate conversions between world space and a fixed-size grid system
class Grid {
    //default pixel size of a single grid cell
    size = 40;


    setSize(value) {
        this.size = value;
    }

    //converts cell index to pixel coordinate and vice-versa
    cellToWorld(x) {
        return x * this.size;
    }
    worldToCell(x) {
        return Math.floor(x / this.size);
    }

    //calculates which grid cell indices are covered by a specific world-space bounds object
    getIndicesFromBounds(bounds) {
        return Bounds.fromCorners(
            Math.floor(bounds.x / this.size),
            Math.floor(bounds.y / this.size),
            Math.ceil(bounds.maxX / this.size),
            Math.ceil(bounds.maxY / this.size)
        );
    }

    //generator that iterates through every cell coordinate within the provided bounds
    * visitCells(bounds) {
        const indexBounds = this.getIndicesFromBounds(bounds);
        for (let x = indexBounds.x; x < indexBounds.maxX; x++) {
            for (let y = indexBounds.y; y < indexBounds.maxY; y++) {
                yield {
                    x,
                    y
                };
            }
        }
    }

}



//A 2D data structure for storing and retrieving values (like characters or light levels) at coordinates
class Raster {
    //nested array representing rows and columns
    data = [];

    set(x, y, value) {
        if (!this.data[y]) {
            this.data[y] = [];
        }
        this.data[y][x] = value;
    }

    //retrieves value or returns null if undefined
    get(x, y) {
        return this.data[y]?.[x] ?? null;
    }

    //resets entire data set
    clear() {
        this.data.length = 0;
    }


    //static factory that converts strings or 2D arrays into a populated Raster instance
    static fromBitmap(bitmap, converter = null) {
        const raster = new Raster();
        if (typeof bitmap === "string") {
            bitmap = bitmap.split("\n");
        }
        bitmap.forEach((row, y) => {
            if (typeof row === "string") {
                row = row.split("");
            }
            row.forEach((symbol, x) => {
                if (converter) {
                    raster.set(x, y, converter(x, y, symbol));
                } else {
                    raster.set(x, y, symbol);
                }
            });
        });
        return raster;
    }
}

let grid = null;
let levelArray = null;
let camera = null;
let lighting = null;
//calculates light propagation across a grid based on cell types and decay settings
class Lighting {
    //stores calculated light intensity per cell
    data = new Raster();

    constructor(grid, palette, settings) {
        //reference to the grid scale
        this.grid = grid;
        //mapping of symbols to properties like solidity and emission
        this.palette = palette;
        //configuration for light decay and minimum levels
        this.settings = settings;
    }

    // Checks if a cell blocks light
    isSolid(symbol) {
        return !!(this.palette[symbol]?.isSolid);
    }

    // Gets base brightness of a cell
    getEmission(symbol) {
        return this.palette[symbol]?.emission ?? 0;
    }

    // Calculates a cell's light level by diffusing light from neighbors and applying decay
    getLightLevel(x, y, symbol) {
        const left = this.data.get(x - 1, y);
        const right = this.data.get(x + 1, y);
        const top = this.data.get(x, y - 1);
        const bottom = this.data.get(x, y + 1);

        const highestNeighbor = Math.max(left, right, top, bottom);
        // Apply different decay rates depending on whether the light is passing through a solid or air
        const lightLevel = Math.max(highestNeighbor * (this.isSolid(symbol) ? this.settings.groundDecay : this.settings.airDecay), this.settings.minLevel);
        const emission = this.getEmission(symbol);
        // If cell emits its own light, use that; otherwise, use calculated diffused light
        if (emission > lightLevel) {
            //
            this.data.set(x, y, emission);
            return emission;
        } else {
            this.data.set(x, y, lightLevel);
            return highestNeighbor; // Do not return the actual calculated light level for the cell. Instead return the highest neighbor, which allows solid blocks adjacent to air to be lit
        }
    }

}


function updateAndRenderLighting(lighting) {
    for (let { x, y } of lighting.grid.visitCells(camera)) {
        const symbol = levelArray.get(x, y);
        ctx.fillStyle = `rgba(1, 1, 1, ${ 1- lighting.getLightLevel(x, y, symbol)})`;
        
        ctx.fillRect(lighting.grid.cellToWorld(x), lighting.grid.cellToWorld(y), lighting.grid.size, lighting.grid.size);
    }
}

//auto tiling, orientation, edge checks. 
const tiled = {
    /**
     * Created by Arrow (@Arrow.programming)
     * January, 2025
     * 
    **/
    left: function(MAP, row, col, char, char2){
        //if(MAP[row][col] === char){
            if(MAP[row][col - 1] === char){
                return true;
            } 
        //}
    },
    right: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(MAP[row][col + 1] === char){
                return true;
            }
        //}
    },
    bottom: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(row < MAP.length - 1){
                if(MAP[row + 1][col] === char){
                    return true;
                }
            }
        //}
    },
    top: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(row > 0){
                if(MAP[row - 1][col] === char){
                    return true;
                }
            }
        //}
    },
    isOnEdge: function(array, row, col) {
        const numRows = array.length;
        const numCols = array[0].length;
        return row === 0 || row === numRows - 1 || col === 0 || col === numCols - 1;
    },
    findEdges: function(matrix) {
        if (!matrix.length) return [];
    
        const edges = [];
        const rows = matrix.length;
        const cols = matrix[0].length;
    
        //top row
        for (let col = 0; col < cols; col++) {
            edges.push(matrix[0][col]);
        }
    
        //right column (excluding the top and bottom corners)
        for (let row = 1; row < rows - 1; row++) {
            edges.push(matrix[row][cols - 1]);
        }
    
        //bottom row (if there's more than one row)
        if (rows > 1) {
            for (let col = cols - 1; col >= 0; col--) {
                edges.push(matrix[rows - 1][col]);
            }
        }
    
        //left column (excluding the top and bottom corners)
        for (let row = rows - 2; row > 0; row--) {
            edges.push(matrix[row][0]);
        }
    
        return edges;
    }
};

Debug.prototype.initParticleStatsRun = function(){
    if (frameCount % this.PARTICLE_SAMPLE_INTERVAL === 0) {
        let a = 0;
        for (let i = 0; i < particleSystems.length; i++) {
            const sys = particleSystems[i];
            if (!sys) continue;
            a += (sys.particles ? sys.particles.length : 0);
            a += (sys.foreverParticles ? sys.foreverParticles.length : 0);
        }
        this.activeParticles = a;
        this.freePool = (particlePool && Array.isArray(particlePool.pool)) ? particlePool.pool.length : 0;
        this.totalObjects = this.freePool + this.activeParticles;
        this.poolUsage = this.totalObjects > 0 ? Math.round((this.activeParticles / this.totalObjects) * 100) : 0;
    }
};

//the render loop
const render = (timestamp) => {try{
    
    //prefer the rAF timestamp when present
    const now = (typeof timestamp === 'number') ? timestamp : performance.now();
    
    //dt in milliseconds, never negative
    dtMs = Math.max(0, now - lastTime);
    lastTime = now;
    
    //dt in seconds (clamped to avoid huge jumps after tab hidden)
    dt = (Math.min(dtMs / 1000, 0.1));
    fps = dtMs > 0 ? Math.round(1000 / dtMs) : fps;
    
    //blank canvas
    ctx.fillStyle = col.bg;
    ctx.fillRect(0, 0, width, height);
            
    
    switch (scene)  {
        case "load": {
            //start image cache (Note to future self: Loading stuff before the cache causes weird issues. Make sure to load the image cache before anything else)
            if(!cache.loaded){
                cache.load();
                
                ctx.fillStyle = "rgb(255, 255, 255)";
                ctx.fillRect(0, 0, width, height);
                    
                ctx.font = "25px Arial";
                ctx.fillStyle = "rgb(35, 35, 35)";
                ctx.fillText("Loading", 300, 300);
            }
            else {
                scene = "game";
            }
            
            //console.log("cache", cache.loaded);
            break;
        }
        case "game": {
                    
            // console.log("dT", dT);
            // console.log("deltaTime", deltaTime);
            // console.log("dt", dt);
            // console.log("dtMs", dtMs);
            // const now = performance.now();
            // const deltaTime = now - lastTime; 
            // lastTime = now;
            
            // fps = Math.round(1000 / deltaTime); 
        
            //console.log("dT", deltaTime);
            //console.log("frameRate", fps);
            
            
            if(debug.particles){
                backdropParticles.add();
                backdropParticles.run(dt);
            }
            
            //before any scaled drawing: clear the whole canvas in device pixels
            ctx.setTransform(1, 0, 0, 1, 0, 0); // reset
            ctx.fillStyle = col.bg || "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            
            ctx.save();
                
                
                //initiate came
                cam.run();
                
                //shakes.push(new Shake(2));
                
                //cam shake loop
                for(let s in shakes){
                    shakes[s].active(s);
                }
                
                //seperate particle entities can be run wherever I want to determine their z-index
                if(debug.particles){
                    poisonParticles.run(dt);
                    poisonStream.run(dt);
                    flameParticles.run(dt);
                }
                
                //this is a seperate array for blocks that go behind the player. These blocks don't even require their own constructor. They just get pushed into the rearBlocks array as a new Block(). And since they don't collide I can call them behind the player in one frame. Clever, right?
                for (let i in rearBlocks) {
                    rearBlocks[i].draw();
                }
                
                //horizontal collisions and player movement
                if(functions.plUpdate){
                    player.moveX(dt);
                }
                
                //collide with mainstream collidable blocks
                for(let i in collidables){
                    let col = player.collideX(collidables[i]);
                    //only collide with one block a frame
                    if(col){
                        break;
                    }
                }
                
                //vertical collisions and player movement
                if(functions.plUpdate){
                    player.moveY(dt);
                }
                
                for(let i in collidables){
                    let col = player.collideY(collidables[i]);
                    //only collide with one block a frame
                    if(col){
                        break;
                    }
                }
                
                //cpu collisions on y axis
                for(let i in collidables){
                    for(let j in cpus){
                        //issue:
                        let col = cpus[j].collideY(collidables[i]);
                        //only collide with one block a frame
                        if(col){
                            break;
                        }    
                    }
                }
                
                for(let cpu of cpus){
                    for(let block of collidables){
                        let col = cpu.collideY(block);
                        if(col) break;
                    }
                }
                
                //draw the player
                if(functions.plDisplay){
                    player.display(dt);
                }
                
                //running this before the blocks allows me to capture the player only when doing a death animation
                functions.execute(player);
                for (let i in cpus) {
                    cpus[i].run(player);
                }
                
                if(debug.particles){
                    snowMovementParticles.run(dt);
                }
                
                //draw the blocks
                for (let i in nonCollidables) {
                    nonCollidables[i].draw();
                }
                for (let i in collidables) {
                    collidables[i].draw();
                }
                for (let i in cpus) {
                    cpus[i].draw();
                }
                
                //world lighting
                if(debug.lighting){
                    updateAndRenderLighting(lighting);
                }
                
                //update the world real time
                functions.updateWorld(dt);
            ctx.restore();
            
            //load texture, this adds more depth to the game
            img(cache.img[0], 0, 0);
                
            //name them
            functions.roomName();
            
            //particle statistics
            if(debug.particleStats){
                debug.initParticleStatsRun();
            }
            if(debug.toggleDeltaTime){
                //debug.initDeltaTime();
            }
            
            //draw minimap
            debug.minimap();
            break;
        }
    }
    
    
    //reset events
    mouse.released = false;
    mouse.clicked = false;
    
    
    //this is dev junk
    ctx.font = "25px Arial";
    ctx.fillStyle = "white";
    ctx.fillText("", 10, 30);
    //ctx.fillText(err, 10, 50);
    //ctx.fillText(JSON.stringify(mouse), 10, 80);
    
    //thumbnail for stalkers
    if(keys[84]){
        ctx.fillRect(0, 0, width, height);
    }
      
    
    debug.run();
    
    frameCount += 1;
    
}
catch(e){

    }
});

        render(now);
        rafId = requestAnimationFrame(loop);

}

//convert screen pixels to world pixels
function screenToWorld(cssX, cssY) {
    const worldX_preCam = cssX / displayScale;
    const worldY_preCam = cssY / displayScale;
    const worldX = worldX_preCam / cam.z + cam.x - cam.align.x - (shake.x || 0);
    const worldY = worldY_preCam / cam.z + cam.y - cam.align.y - (shake.y || 0);
    return { 
        x: worldX, 
        y: worldY
    };
}
function worldToScreen(worldX, worldY) {
    //calculate the total scale used in your camera
    const totalScale = cam.z * dprVal * displayScale;

    //undo the camera translation (this.x, align, shake) 
    //and then apply the total scale
    const screenX = (worldX - cam.x + cam.align.x + (shake.x || 0)) * totalScale;
    const screenY = (worldY - cam.y + cam.align.y + (shake.y || 0)) * totalScale;

    return { 
        x: screenX, 
        y: screenY 
    };
}


window.addEventListener('mousemove', (e) => {
  mouse.screenX = e.clientX;
  mouse.screenY = e.clientY;

  const w = screenToWorld(mouse.screenX, mouse.screenY);
  mouse.worldX = w.x;
  mouse.worldY = w.y;

  mouse.x = mouse.screenX;
  mouse.y = mouse.screenY;
});
