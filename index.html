<!DOCTYPE html>
<html>
    <head>

        <!--The container for the entire thing-->
        <div id="container">
            <div id="game-wrapper">
                <canvas id = "game"></canvas>

            <div id="overlay">

                    <span class='material-icons' id='fullscreen'>fullscreen</span>

    <script type src="utils.js"></script>
    <script type src="canvas.js"></script>

    <!-- screw all the code i couldnt understand, i will completely redo it -->
    <script type>
        const engine = MEngine.create({});
        engine.setRenderConfig(canvas, 36, 9);
        
        

        //for testing
        //engine.renderer.debug = true;

        const shakes = [];
        const shake = { x: 0, y: 0 };

        class Shake {
            constructor(n) {
                this.n = n;
            }
            active(increment) {
                shake.x = (Math.random() * 2 - 1) * this.n;
                shake.y = (Math.random() * 2 - 1) * this.n;
                this.n -= 0.5;
                if (this.n < 0) {
                    shake.x = 0;
                    shake.y = 0;
                    shakes.splice(increment, 1);
                }
            }
        }
        
        class RoomTransition {
            constructor() {
                this.snap = document.createElement('canvas');
                this.active = false;
                this.dir = null;
                this.t = 0;
            }

            capture(canvas) {
                this.snap.width  = canvas.width;
                this.snap.height = canvas.height;
                this.snap.getContext('2d').drawImage(canvas, 0, 0);
            }

            start(dir) { this.active = true; this.dir = dir; this.t = 0; }

            render(ctx, dt) {
                if (!this.active) return;
                this.t += (1 - this.t) * 10 * dt; // exponential ease, same trick as Capture

                const w = this.snap.width, h = this.snap.height;
                let ox = 0, oy = 0;
                switch (this.dir) {
                    case 'right':  ox = -w * this.t; break;
                    case 'left':   ox =  w * this.t; break;
                    case 'bottom': oy = -h * this.t; break;
                    case 'top':    oy =  h * this.t; break;
                }
                ctx.drawImage(this.snap, ox, oy);
                if (this.t > 0.99) this.active = false;
            }
        }

        //make my life less stressful than it already is
        const addShake = (power) => shakes.push(new Shake(power));
        engine.onGroundPound = () => addShake(10);
        engine.groundPoundMult = 2;
        const ANIM_FPS = {
            idle: 4,
            run:  8,
            jump: 12,
            fall: 8,
            groundpound: 10,
            groundpoundimpact: 10,
        };

        engine.createPlayer(0, 0, 0.97, 1.4, (t, player) => { 
            const state = player.state ?? 'idle';
            const frames = gfx.player[state] ?? gfx.player.idle;
            const fps = ANIM_FPS[state] ?? 6;
            const count = Object.keys(frames).length;
            let frame;

            //if you prefer chaining if else statements you need help
            switch (state) {
                case 'jump':
                case 'fall': {
                    frame = Math.min(count - 1, Math.floor((player.airTime ?? 0) * fps));
                    break;
                }
                case 'groundpound': {
                    frame = 0;
                    break;
                }
                case 'groundpoundimpact': {
                    //play impact frames forward once then hold last
                    frame = Math.min(count - 1, Math.floor((player.impactTime ?? 0) * fps));
                    break;
                }
                default: {
                    frame = Math.floor(t * fps) % count;
                }
            }
            
            //just in case yk?
            frame = Math.max(0, Math.min(count - 1, frame));
            return frames[frame];
        });
        
        const tileMap = {
            '#': { type: MSolid, tileset: gfx.tiles.A },
            '@': { type: MDecorative, tileset: gfx.tiles.a },
            'B': { type: MSolid, tileset: gfx.tiles.B },
        };

        const builder = new WorldBuilder(engine, 1, tileMap);
        const world   = new WorldManager(engine, roomTemplates, worldAssembly, builder);

        world.loadRoom(0, 0);
        world.placePlayer(engine.player, 10, 12);

        const roomTransition = new RoomTransition();
        world.transition = roomTransition;

        let lastTime = performance.now();
        let firstTime = performance.now();
        let frameCount = 0, dtMs, dt, tMs, t, fps;

        //a render loop with a timestamp for dt updating @Judges
        const render = (timestamp) => {
            try {
                //prefer the rAF timestamp when present
                const now = typeof timestamp === "number" ? timestamp : performance.now();

                //dt in milliseconds, never negative
                dtMs = Math.max(0, now - lastTime);
                tMs = Math.max(0, now - firstTime);

                lastTime = now;

                //dt in seconds (clamped to avoid huge jumps after tab hidden)
                dt = Math.min(dtMs / 1000, 0.1);
                t = tMs / 1000;
                fps = dtMs > 0 ? Math.round(1000 / dtMs) : fps;
                
                //snapshot must happen before the clear
                if (world.hasPending()) roomTransition.capture(canvas);

                ctx.fillStyle = "rgb(100, 100, 100)";
                ctx.fillRect(0, 0, width, height);

                shakes.forEach((s, i) => s.active(i));

                ctx.save();
                ctx.translate(shake.x, shake.y);
                world.execute(engine.player);

                //freeze player during slide and render-only
                if (roomTransition.active) {
                    engine.renderer.render(t);
                } else {
                    engine.tick(t, dt, events);
                }

                roomTransition.render(ctx, dt);
                ctx.restore();
                //frameCount
                frameCount ++;
                
                Object.assign(eventsPrev, events);
            } catch (e) {
                console.error("Main loop error\n" + e.stack);
            }
        };

        //Replace interval with rAF
        let rafId = null;
        let running = true;

        //pause when tab hidden to avoid wasted frames @Judges
        document.addEventListener("visibilitychange", () => {
            running = !document.hidden;
            if (running && rafId === null) {
                rafId = requestAnimationFrame(loop);
            }
            if (!running && rafId !== null) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
        });
        /**
        * main animation loop that requests frames and triggers rendering while the game is running
        * @param {number} now - the current timestamp provided by requestanimationframe
        * @returns {void}
        */
        function loop(now) {
            //if (!debug.freeze) {
            if (!running) {
                rafId = null;
                return;
            }
            render(now);
            rafId = requestAnimationFrame(loop);
            //}
            //console.info(debug.freeze);
        }

        //start
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(loop);
    </script>
</html>
