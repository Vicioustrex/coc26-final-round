    <script type>
        const engine = MEngine.create({});
        engine.setRenderConfig(canvas, 36, 9);
        
        const ANIM_FPS = {
            idle: 4,
            run:  8,
            jump: 12,
            fall: 8,
        };

        engine.createPlayer(0, 0, 16 / 9, 14 / 9, (t, player) => {
            const state  = player.state ?? 'idle';
            const frames = gfx.player[state] ?? gfx.player.idle;
            const fps    = ANIM_FPS[state] ?? 6;
            const frameCount = Object.keys(frames).length;
            const frame  = Math.floor(t * fps) % frameCount;
            return frames[frame];
        });
        
        //engine.createPlayer(0, 0, 16 / 9, 14 / 9, (t, player) => gfx.player.idle[0]);

        const block = (t, block) => gfx.tiles.A.yyyy;

        engine.world.add(new MSolid(0, 5, 1, 1, block));
        engine.world.add(new MSolid(1, 5, 1, 1, block));
        engine.world.add(new MSolid(2, 5, 1, 1, block));
        engine.world.add(new MSolid(3, 5, 1, 1, block));
        engine.world.add(new MSolid(4, 5, 1, 1, block));
        engine.world.add(new MSolid(5, 5, 1, 1, block));
        engine.world.add(new MSolid(6, 5, 1, 1, block));
        engine.world.add(new MSolid(7, 5, 1, 1, block));
        engine.world.add(new MSolid(8, 5, 1, 1, block));
        engine.world.add(new MSolid(9, 5, 1, 1, block));
        engine.world.add(new MSolid(9, 4, 1, 1, block));
        engine.world.add(new MSolid(9, 3, 1, 1, block));
        
        let lastTime = performance.now();
        let firstTime = performance.now();
        let frameCount = 0, dtMs, dt, tMs, t, fps;

        //a render loop with a timestamp for dt updating @Judges
        const render = (timestamp) => {
            try {
                //prefer the rAF timestamp when present
                const now = typeof timestamp === "number" ? timestamp : performance.now();

                //dt in milliseconds, never negative
                dtMs = Math.max(0, now - lastTime);
                tMs = Math.max(0, now - firstTime);

                lastTime = now;

                //dt in seconds (clamped to avoid huge jumps after tab hidden)
                dt = Math.min(dtMs / 1000, 0.1);
                t = tMs / 1000;
                fps = dtMs > 0 ? Math.round(1000 / dtMs) : fps;

                ctx.fillRect(0, 0, width, height);

                //run the game based on deltatime
                engine.tick(t, dt, events);
                            
                //frameCount
                frameCount++;
            } catch (e) {
                console.error("Main loop error\n" + e.stack);
            }
        };

        //Replace interval with rAF
        let rafId = null;
        let running = true;

        //pause when tab hidden to avoid wasted frames @Judges
        document.addEventListener("visibilitychange", () => {
            running = !document.hidden;
            if (running && rafId === null) {
                rafId = requestAnimationFrame(loop);
            }
            if (!running && rafId !== null) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
        });
        /**
        * main animation loop that requests frames and triggers rendering while the game is running
        * @param {number} now - the current timestamp provided by requestanimationframe
        * @returns {void}
        */
        function loop(now) {
            //if (!debug.freeze) {
            if (!running) {
                rafId = null;
                return;
            }
            render(now);
            rafId = requestAnimationFrame(loop);
            //}
            //console.info(debug.freeze);
        }

        //start
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(loop);
    </script>
